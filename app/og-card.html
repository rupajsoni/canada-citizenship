<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; overflow: hidden;
    background: #0f1117;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #141720 0%, #0f1117 60%, #1a0a0d 100%);
    display: flex; align-items: center; justify-content: space-between;
    padding: 80px 96px;
    position: relative; overflow: hidden;
  }
  /* Subtle red glow top-right */
  .card::before {
    content: '';
    position: absolute; top: -120px; right: -80px;
    width: 480px; height: 480px; border-radius: 50%;
    background: radial-gradient(circle, rgba(200,16,46,0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  /* Grid texture */
  .card::after {
    content: '';
    position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }
  .left { flex: 1; z-index: 1; }
  .logo-row {
    display: flex; align-items: center; gap: 20px; margin-bottom: 36px;
  }
  .logo-mark {
    width: 64px; height: 64px; border-radius: 16px;
    background: #C8102E;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 32px rgba(200,16,46,0.45);
    flex-shrink: 0;
  }
  .logo-mark svg { width: 36px; height: 36px; }
  .logo-text { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
  .logo-sub { font-size: 14px; color: rgba(255,255,255,0.45); font-weight: 500; margin-top: 2px; }
  h1 {
    font-size: 48px; font-weight: 800; color: #fff;
    line-height: 1.15; letter-spacing: -1px; margin-bottom: 20px;
    max-width: 560px;
  }
  h1 span { color: #C8102E; }
  .desc {
    font-size: 18px; color: rgba(255,255,255,0.55); line-height: 1.6;
    max-width: 520px; font-weight: 400;
  }
  .right {
    z-index: 1; display: flex; flex-direction: column; gap: 14px;
    flex-shrink: 0; margin-left: 60px;
  }
  .pill {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 14px 20px;
    color: rgba(255,255,255,0.8); font-size: 15px; font-weight: 500;
    display: flex; align-items: center; gap: 12px; white-space: nowrap;
  }
  .pill-icon { font-size: 18px; }
  .badge {
    display: inline-block; margin-top: 32px;
    background: rgba(200,16,46,0.15); border: 1px solid rgba(200,16,46,0.3);
    color: #f87171; font-size: 13px; font-weight: 600; letter-spacing: .04em;
    padding: 6px 14px; border-radius: 99px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="left">
    <div class="logo-row">
      <div class="logo-mark">
        <svg viewBox="-2015 -2000 4030 4030" xmlns="http://www.w3.org/2000/svg">
          <path fill="white" d="m-90 2030 45-863a95 95 0 0 0-111-98l-859 151 116-320a65 65 0 0 0-20-73l-941-762 212-99a65 65 0 0 0 34-79l-186-572 542 115a65 65 0 0 0 73-38l105-247 423 454a65 65 0 0 0 111-57l-204-1052 327 189a65 65 0 0 0 91-27l332-652 332 652a65 65 0 0 0 91 27l327-189-204 1052a65 65 0 0 0 111 57l423-454 105 247a65 65 0 0 0 73 38l542-115-186 572a65 65 0 0 0 34 79l212 99-941 762a65 65 0 0 0-20 73l116 320-859-151a95 95 0 0 0-111 98l45 863z"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">Northbound</div>
        <div class="logo-sub">northbound.ca</div>
      </div>
    </div>
    <h1>Pass your<br><span>Canadian citizenship</span><br>test. Free.</h1>
    <div class="desc">10 structured modules · Active recall flashcards<br>Timed practice exams · Topic-level gap analysis</div>
    <div class="badge">Free · No account needed</div>
  </div>
  <div class="right">
    <div class="pill"><span class="pill-icon">📘</span> Lessons & flashcards</div>
    <div class="pill"><span class="pill-icon">⏱</span> Timed practice exam</div>
    <div class="pill"><span class="pill-icon">📊</span> Readiness score</div>
    <div class="pill"><span class="pill-icon">🗺</span> Interactive Canada map</div>
    <div class="pill"><span class="pill-icon">📅</span> Timeline drill</div>
  </div>
</div>
</body>
</html>
